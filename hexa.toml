# hexa.toml — hexa-codex standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-codex
# Provenance: extracted from n6-architecture@c0f1f570 on 2026-05-06
#             (domains/cognitive/ai-* + cognitive-architecture + causal-chain
#              + youth-ai-labeling-rlhf-hub — 17 verb / 4 group)

[package]
name = "hexa-codex"
version = "1.0.0"
entry = "cli/hexa-codex.hexa"
description = "AI knowledge substrate (HEXA family) — alignment·safety·welfare·training·inference·multimodal 17-verb (4 groups: safety + economics + ops + substrate). Spec-first library (codex) of closed-form AI candidate specs + falsifier preregister; .hexa CLI dispatcher TBD."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/hexa-codex"
homepage = "https://github.com/need-singularity/hexa-codex"
readme = "README.md"
keywords = ["ai-knowledge", "codex", "alignment", "safety", "welfare", "interpretability", "rlhf", "multimodal", "hexa-family", "spec-catalog"]
categories = ["ai-research", "knowledge-substrate", "spec-catalog"]

[[bin]]
name = "hexa-codex"
path = "cli/hexa-codex.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
    "tests/test_lattice.hexa",
    "tests/test_all.hexa",
]

# Python pytest tests (Python stdlib only — no pip install required).
# Runner is `python3 -m pytest tests/ -m auto` (or via build/Makefile).
[test.python]
runner = "pytest"
marker = "auto"
files = [
    "tests/test_n6_invariants.py",
    "tests/test_verifiers.py",
    "tests/test_calculators.py",
    "tests/test_release_ladder.py",
    "tests/test_spec_inventory.py",
    "tests/test_install_hexa.py",
]

# ── hx install hook ───────────────────────────────────────
[scripts]
install = "install.hexa"

# ── Modules manifest (17 verb / 4 group, spec-first) ─────
# Each verb ships as a single .md spec file at <verb>/<source>.md
# under the original n6-architecture name (file-renames deferred).
# Wire-up of .hexa modules + falsifier ODE/Bayesian sandboxes is
# deferred to post-v1.0 cycles; v1.0 is a docs/spec catalog only.
[modules]
safety = [
    "alignment/ai-alignment.md",
    "safety/ai-safety.md",
    "welfare/ai-welfare.md",
    "adversarial/ai-adversarial.md",
    "consciousness/ai-consciousness.md",
    "interpret/ai-interpretability.md",
]
economics = [
    "train_cost/ai-training-cost.md",
    "infer_cost/ai-inference-cost.md",
    "quality_scale/ai-quality-scale.md",
]
ops = [
    "deploy/ai-deployment.md",
    "enterprise/ai-enterprise-custom.md",
    "agent_serving/ai-agent-serving.md",
    "eval/ai-eval-pipeline.md",
]
substrate = [
    "multimodal/ai-multimodal.md",
    "rlhf/youth-ai-labeling-rlhf-hub.md",
    "cog_arch/cognitive-architecture.md",
    "causal/causal-chain.md",
]

# Runnable surface (added 2026-05-07) — Python verifiers, build scripts,
# and pytest harness mirroring hexa-sscb's pattern. Each Python verifier
# is stdlib-only (no pip install required).
verify = [
    "verify/cli.py",                # unified verifier dispatcher
    "verify/n6_arithmetic.py",      # n=6 lattice arithmetic identity
    "verify/spec_inventory.py",     # 17-verb spec presence + headers
    "verify/group_audit.py",        # 4-group / 17-verb consistency
    "verify/release_ladder.py",     # v1.0..v2.0 ladder monotonicity
    "verify/release_params.py",     # per-version parameter registry
    "verify/falsifier_check.py",    # F-CODEX-1..4 arithmetic floors
    "verify/reference_inventory.py",# papers/ + formal/ md5 + provenance audit
    "verify/calc_train_cost.py",    # F-CODEX-1 closed form
    "verify/calc_infer_cost.py",    # F-CODEX-2 closed form
    "verify/calc_alignment.py",     # F-CODEX-3 axis aggregator
    "verify/calc_interpret.py",     # F-CODEX-4 motif counter
    "verify/calc_quality_scale.py", # quality_scale Chinchilla-comparable fit
    "verify/lattice_explore.py",    # n=k lattice arithmetic explorer
    "verify/verb_query.py",         # verb info / spec lookup tool
    "verify/lattice_check.hexa",    # n=6 closure audit (.hexa, recipe §7.4 T1)
]
build = [
    "build/Makefile",               # verify + test + ci + per-verb pdf fan-out
]
papers = [
    "papers/README.md",                                       # reference-annex index
    "papers/n6-ai-17-techniques-experimental-paper.md",       # P1: 17 verb σ·φ=24 map (192/192 EXACT)
    "papers/n6-ai-techniques-68-integrated-paper.md",         # P2: wider 68-tech atlas
    "papers/n6-ai-ethics-governance-paper.md",                # P4: ai-ethics+governance overlay (0/24 EXACT, MATURITY=LOW)
    "papers/n6-governance-safety-urban-paper.md",             # P5: governance+safety+urban (58/58 EXACT, MATURITY=HIGH)
]
formal = [
    "formal/README.md",                                       # formal-substrate index
    "formal/lean4/N6/InvariantLattice/Sigma.lean",            # σ(n) Nat definition
    "formal/lean4/N6/InvariantLattice/SigmaLatticeCard.lean", # F-CL-FORMAL-1 PROVEN
]
deepdive = [
    "consciousness/measurement-protocol.md",                  # BT-19 α_IIT·α_GWT=1 reproducible EEG/fMRI protocol
    "consciousness/red-team-failure.md",                      # BT-19 red-team refutation — falsifier discipline demo
]

# ── Dependencies ───────────────────────────────────────────
[dependencies]
hexa-lang = ">=1.0.0"
python    = ">=3.10"   # stdlib only — no pip deps for verify/

# ── n=6 master identity (.roadmap.hexa_codex §A.1) ────────
[invariants.n6]
sigma_6           = 12     # σ(6) — HELM 12-dimension capability bin
tau_6             = 4      # τ(6) — 4 lifecycle phases AND 4 group taxonomy
phi_6             = 2      # φ(6) — 2-bit verdict (helpful / harmless)
J_2               = 24     # σ·φ = n·τ — training-cost N^J₂ scaling stratum
master_identity   = "σ(6) · φ(6) = n · τ(6) = J₂ = 24"

# ── Falsifier preregister (.roadmap.hexa_codex §A.4) ──────
[falsifiers]
F_CODEX_1 = "training_cost ∝ N^σ·φ = N^24 — Chinchilla scaling-law fit?"
F_CODEX_2 = "inference_cost ∝ context^τ = context^4 — Claude 4.7 1M ctx latency fit?"
F_CODEX_3 = "alignment eval n=6 axis HELM-comparable score?"
F_CODEX_4 = "interpretability circuit count σ-φ=10 motif statistics?"

# ── Closure provenance (raw#10 honest C3) ─────────────────
[closure]
verbs_total       = 17
groups_total      = 4
verbs_wired       = 0
verbs_spec        = 17
papers_absorbed   = 4     # P1+P2 (ai-techniques) + P4 (ai-ethics-governance) + P5 (governance-safety-urban)
formal_proofs     = 1     # F-CL-FORMAL-1 σ(6)=12 PROVEN (Lean 4)
deepdives         = 2     # consciousness/measurement-protocol + red-team-failure
verifiers_pass    = "6/6"
acceptance_pass   = "62/62 pytest auto + 17/17 verb spec presence (.hexa selftest)"
falsifier_floor   = "4/4 arithmetic-floor PASS (empirical evals land v1.1+)"
verdict           = "SPEC_CATALOG_ONLY + RUNNABLE_VERIFICATION_SURFACE + FORMAL_PROOF_ANCHOR"
extracted_from    = "n6-architecture@c0f1f570 on 2026-05-06"
runnable_added_on = "2026-05-07 (verify/ + build/ + python tests/, mirroring hexa-sscb pattern)"
references_added_on = "2026-05-07 (papers/ + formal/ from n6-architecture@0c65155a, P1+P2+P3)"
runnable_hexa_iter1 = "2026-05-07 (verify/lattice_check.hexa 24/24 PASS — recipe §7.4 priority 1; T1 floor for F-CODEX-1..4)"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "17-verb AI knowledge substrate (4 groups: safety + economics + ops + substrate). spec-first library + runnable verification surface (verify/ + tests/ + build/). Each verb ships closed-form candidate + falsifier preregister; F-CODEX-1..4 arithmetic floors verified, empirical evals land v1.1.0..v2.0.0."
not_scope = [
    "model training (read-side; this is a write-side spec library)",
    "deployed inference SaaS",
    "RLHF data labeling production pipeline",
    "regulatory or alignment claims (preregister only — no validation)",
    "F-CODEX-1..4 empirical fits (arithmetic floor only at v1.0.0)",
]

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (markdown spec library + Python stdlib verifiers + .hexa CLI router)"
all_verbs         = "$0 (read-only)"
verify_runtime    = "<3s wall (5 verifiers serial)"
test_runtime      = "<20s wall (61 pytest auto-cases)"
