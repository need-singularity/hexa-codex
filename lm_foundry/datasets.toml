# =============================================================================
# datasets.toml — hexa-forge dataset registry (v0.1.2 corpus audit)
# =============================================================================
#
# Cross-link: docs/code-llm.md §STRUCT (stage table) +
#             ROADMAP.md §4 item 4 (initial schema) +
#             TODO.md §2 v0.2.0 cross-cutting infra item 1 (central registry).
#
# Source findings:
#   - papers/tier-a-findings.md        (Tier A — language-native idiom canon)
#   - papers/tier-b-findings.md        (Tier B — cross-language principles)
#   - papers/tier-c-findings.md        (Tier C — post-mortem canon)
#   - papers/tier-e-findings.md        (Tier E — anti-corpus / DPO negatives)
#   - papers/frontend-f1-findings.md   (F-1 frameworks + design systems)
#   - papers/frontend-f2-findings.md   (F-2 native web platform + CSS)
#   - papers/frontend-f3-findings.md   (F-3 perf + a11y + AI-native UI)
#
# -----------------------------------------------------------------------------
# README — how this file is used
# -----------------------------------------------------------------------------
#
# Versioning:
#   - `[meta] schema_version` MUST be bumped any time the entry schema changes
#     (new required field, renamed field, removed field, semantics shift).
#   - `[meta] entry_revision` SHOULD be bumped on data-only edits
#     (URL fixes, license corrections, tokens_actual fills).
#   - When in doubt, bump entry_revision; only the curator-of-record
#     bumps schema_version.
#
# Consumed by:
#   - `tool/license_clean_scan.py` — reads every `license` field, cross-checks
#       against the SPDX allowlist (MIT / Apache-2.0 / BSD-* / ISC / 0BSD /
#       Unlicense / CC0-1.0 / CC-BY-* / PSF / PostgreSQL / public-domain /
#       Zlib / MPL-2.0). Fails the build on GPL/AGPL/SSPL/NC/ND or unknown.
#       Entries marked "QUOTE-ONLY" are skipped from bulk-train and routed
#       to the excerpt-only sub-corpus.
#   - `tool/stack_v2_sample.py` (planned) — fetches the dataset, computes
#       `sha256_corpus`, tokenizes with the Qwen tokenizer, and writes the
#       observed `tokens_actual` back into this file (commit-time).
#   - `tool/tokenize.py` (planned) — same flow for the Tier A/B/C/E
#       anchor sources listed below.
#
# Forbidden content:
#   - DO NOT inline license text. License obligations live in the
#     accompanying NOTICE/LICENSE files, not in this manifest.
#   - DO NOT inline corpus content. This file is a manifest only.
#     Any `notes` field longer than ~120 chars is a smell.
#   - DO NOT add entries that lack a verified `url`. If a source is
#     `UNVERIFIED` in the findings docs and has no usable URL, omit it
#     entirely; if it has a tentative URL, set `fetch_status = "url-broken"`.
#
# Naming convention:
#   [datasets.code.<stage>.<id>] where
#     - <stage> ∈ { pretrain-bias | domain-bias | build-trace | diff-edit
#                   | repair | hexa-native | philosophy | db-native
#                   | firmware-native | hexa-firmware }
#     - <id> is a stable kebab-case slug, never reused, never renamed.
#
# Hard exclusions (re-checked at audit-time):
#   - Apple Human Interface Guidelines (proprietary; F-1 hard blocker).
#   - GPL/LGPL/AGPL/GFDL content (only ever QUOTE-ONLY excerpts).
#   - Common Crawl raw dumps (post-2024 AI-slop saturation).
#   - medium.com / dev.to / hashnode / substack post-2023-01-01.
#
# =============================================================================

# -----------------------------------------------------------------------------
# [schema] — entry shape
# -----------------------------------------------------------------------------
# Each dataset entry: [datasets.<verb>.<stage>.<id>]
#
# Fields (all strings unless noted):
#   url                 # canonical source URL (verified by the curator)
#   license             # SPDX id — one of:
#                       #   MIT | Apache-2.0 | BSD-3-Clause | BSD-2-Clause
#                       #   | ISC | Unlicense | CC0-1.0 | CC-BY-4.0
#                       #   | CC-BY-3.0 | CC-BY-SA-4.0 | CC-BY-SA-2.0
#                       #   | PSF | PostgreSQL | "public-domain" | Zlib
#                       #   | MPL-2.0 | 0BSD | "MIT OR Apache-2.0"
#                       # — or "QUOTE-ONLY" for GPL/LGPL/GFDL/Elastic 2.0/SSPL
#                       # — or "UNKNOWN" when blocking on a license check
#   attribution         # REQUIRED if license is CC-BY-*; string template
#                       # (e.g. "© <authors>, CC-BY-4.0, <source-url>")
#   weight              # float — multiplier in mix; default 1.0;
#                       # hexa-canon = 10.0
#   tier                # A | B | C | D | E | F1 | F2 | F3
#   tokens_est          # rough order of magnitude: "10K" | "100K" | "1M" | "10M"
#   tokens_actual       # populated after tool/stack_v2_sample.py or
#                       # tool/tokenize.py run; "" until then
#   fetch_status        # "pending" | "fetched" | "blocked-by-license" | "url-broken"
#   notes               # 1-line caveat (optional, <120 chars)
#   sha256_corpus       # populated post-fetch; "" until then
# -----------------------------------------------------------------------------
#
# Weight policy (cross-link: docs/code-llm.md §STRUCT):
#   - Tier D `hexa-canon` / `hexa-native` entries  →  weight = 10.0
#   - All other entries (Tier A/B/C/E/F1/F2/F3)    →  weight = 1.0 (default)
#
# Perplexity gate (D-NEW-TC-E, must — applied PRE-MIX, upstream of this file):
#   `tool/corpus_quality_filter.py` (planned, v0.2.0 §5 infra) runs a
#   per-source perplexity filter on the `pretrain-bias` Stack v2 permissive
#   subset before the sampling pipeline reads entries from this manifest.
#   Tier A/B/C/D/E entries here are curator-vetted and bypass the gate.
#
# Synthetic-share ceiling (D-NEW-TC-B, must):
#   Per-stage cap: `synth_share ≤ 0.80` of effective tokens. Enforced at
#   sampling time (not encoded per-entry here). The `philosophy` stage's
#   ×5-10 principle×idiom synth must respect this cap; a 5-generation
#   variance monitor watches for Shumailov-style collapse.
# -----------------------------------------------------------------------------

[meta]
schema_version  = "0.1.0"
entry_revision  = "0.1.2"
last_audit_date = "2026-05-11"
audit_phase     = "v0.1.2 corpus audit"
verb            = "code"
notes           = "Initial registry; tokens_actual + sha256_corpus filled post-fetch."

