# tree-sitter rule pack v1 — master index
#
# Spec: papers/spec-treesitter-rule-pack.md
# Anti-corpus: papers/tier-e-findings.md Part 1
# Decision: D-013 (proposed default, 2026-05-11)
# License: MIT
#
# Field reference: §3 of the spec doc.
# Severity:
#   block — generation containing this pattern is auto-rejected at audit
#   warn  — flagged for DPO mining; not a hard reject
#   info  — recorded for motif-count only
#
# Mining-yield estimates are order-of-magnitude across the-stack-v2.
#
# Many queries are marked UNVERIFIED in their .scm files — v0.1.3 G-BASE
# pass runs them through `tree-sitter parse` to confirm or rewrite.

pack_version = "v1"
last_updated = "2026-05-11"
spec = "papers/spec-treesitter-rule-pack.md"

# ----- grammars (pinning recorded at v0.1.3 implementation time) -------

[grammars]
python     = "tree-sitter-python@^0.20.4 (TBD pin at v0.1.3)"
rust       = "tree-sitter-rust (TBD pin at v0.1.3)"
typescript = "tree-sitter-typescript (TS dialect; TBD pin at v0.1.3)"
go         = "tree-sitter-go (TBD pin at v0.1.3)"
c          = "tree-sitter-c (TBD pin at v0.1.3)"

